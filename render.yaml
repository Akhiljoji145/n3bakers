databases:
  - name: n3bakers-db
    plan: free
    databaseName: n3bakers
    user: n3bakers_user

services:
  - type: web
    name: n3bakers-backend
    runtime: python
    rootDir: backend
    buildCommand: bash ./build.sh
    startCommand: gunicorn --bind 0.0.0.0:$PORT n3_backend.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: n3bakers-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: RENDER
        value: "True"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: PYTHON_VERSION
        value: 3.11.0 # Realistic version
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_EMAIL
        value: admin@n3bakers.com
      - key: ADMIN_PASSWORD
        generateValue: true

  # 3. Frontend (Expo Web)
  - type: web
    name: n3bakers-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: EXPO_PUBLIC_API_URL
        value: https://n3bakers-backend.onrender.com/api/
